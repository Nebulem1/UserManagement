name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
    lint:
        runs-on: ubuntu-latest

        steps:
          - name: Checkout Code
            uses: actions/checkout@v4

          - name: Setup Python
            uses: actions/setup-python@v5
            with:
              python-version: "3.12"

          - name: Install Ruff
            run: |
              python -m pip install --upgrade pip
              pip install ruff

          - name: Run Ruff
            run: ruff check .

    test:
        runs-on: ubuntu-latest
        needs: lint
        
        steps:
          - name: Checkout Code
            uses: actions/checkout@v4
        
          - name: Setup Python
            uses: actions/setup-python@v5
            with:
              python-version: "3.12"
        
          - name: Install Dependencies
            run: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt
        
          - name: Run Tests
            run: |
              python -m pytest -v
    
    docker:
        runs-on: ubuntu-latest
        needs: test
        
        
        steps:
          - name: Checkout Code
            uses: actions/checkout@v4
        
          - name: Build Docker Image
            run: |
              docker build -t usermanagementapi .
